<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      
      .sans-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .letter-spacing-tight { letter-spacing: -0.02em; }
      .letter-spacing-wide { letter-spacing: 0.05em; }
      .letter-spacing-tagline { letter-spacing: 0.15em; }
    </style>

    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#00BA74" />
      <stop offset="60%" stop-color="#00B294" />
      <stop offset="100%" stop-color="#0072CE" />
    </linearGradient>

    <radialGradient id="halo" cx="30%" cy="50%" r="55%" fx="25%" fy="45%">
      <stop offset="0%" stop-color="#00BA74" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#FAFAF7" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#FAFAF7" />
  <rect width="1200" height="630" fill="url(#halo)" />

  <g transform="translate(820, 310)" opacity="0.25">
    <path d="M 40,90 L 190,90 L 250,150 L 250,330 L 40,330 Z" fill="none" stroke="#00BA74" stroke-width="4.5" stroke-linejoin="round" />
    <path d="M 190,90 L 190,150 L 250,150" fill="none" stroke="#00BA74" stroke-width="4.5" stroke-linejoin="round" />
    
    <line x1="75" y1="210" x2="215" y2="210" stroke="#00BA74" stroke-width="4" stroke-linecap="round" />
    <line x1="75" y1="245" x2="215" y2="245" stroke="#00BA74" stroke-width="4" stroke-linecap="round" />
    <line x1="75" y1="280" x2="165" y2="280" stroke="#00BA74" stroke-width="4" stroke-linecap="round" />

    <path d="M -70,280 C -70,160 30,70 140,40 C 100,140 20,240 -70,280 Z" fill="#00BA74" fill-opacity="0.08" stroke="#00BA74" stroke-width="5" stroke-linejoin="round" />
    <path d="M -70,280 C -10,210 50,140 140,40" fill="none" stroke="#00BA74" stroke-width="3" stroke-linecap="round" />
  </g>

  <g transform="translate(80, 75)">
    <g transform="translate(0, -5) scale(0.75)">
      <path d="M 12,23 L 73,63 M 73,63 L 31,10 Q 48,50 63,85 M 63,85 L 43,36 M 43,36 L 90,47" 
            fill="none" stroke="url(#logoGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
    </g>
    
    <text x="85" y="44" fill="#0F172A" font-family="'Inter', sans-serif" font-weight="600" font-size="48" letter-spacing="-0.04em">
      em<tspan fill="#00BA74">i</tspan>fy
    </text>
  </g>

  <g transform="translate(80, 275)">
    <text class="sans-text letter-spacing-tight" font-weight="700" font-size="70" fill="#0F172A" line-spacing="1.2">
      <tspan x="0" dy="0">Australian sustainability</tspan>
      <tspan x="0" dy="88">reporting, outsourced</tspan>
    </text>
  </g>

  <g transform="translate(80, 495)">
    <text class="sans-text letter-spacing-wide" font-weight="600" font-size="28" fill="#00BA74" opacity="0.95">
      AASB S2 <tspan fill="#0F172A" opacity="0.25">·</tspan> NGER <tspan fill="#0F172A" opacity="0.25">·</tspan> Scope 3 <tspan fill="#0F172A" opacity="0.25">·</tspan> Modern Slavery
    </text>
  </g>
</svg>
